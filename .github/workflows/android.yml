name: Build Android APK

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk deep-focus-now.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-focus-now-apk
          path: deep-focus-now.apk

      - name: Publish release (link do pobrania na telefon)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Deep Focus Now - APK (najnowszy)
          body: |
            Najnowszy plik APK aplikacji na telefon.
            Pobierz "deep-focus-now.apk" na telefonie i zainstaluj (zezwol na instalacje z nieznanych zrodel),
            potem wlacz usluge Dostepnosci: "Deep Focus Now".
          files: deep-focus-now.apk
          make_latest: true
